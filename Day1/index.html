<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100">

    <div class="flex justify-center gap-8 p-10">

      <!-- Card 1 -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden w-72">
        <img
          src="https://picsum.photos/300/200?random=1"
          alt="Card Image"
          class="w-full h-48 object-cover"
        />

        <div class="p-5">
          <h2 class="text-xl font-bold mb-2">Web Development</h2>
          <p class="text-gray-600 mb-4">
            Learn HTML, CSS, Tailwind CSS, and JavaScript to build modern websites.
          </p>

          <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
            Learn More
          </button>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden w-72">
        <img
          src="https://picsum.photos/300/200?random=2"
          alt="Card Image"
          class="w-full h-48 object-cover"
        />

        <div class="p-5">
          <h2 class="text-xl font-bold mb-2">UI Design</h2>
          <p class="text-gray-600 mb-4">
            Create beautiful and responsive user interfaces with Tailwind CSS.
          </p>

          <button class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded">
            Explore
          </button>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden w-72">
        <img
          src="https://picsum.photos/300/200?random=3"
          alt="Card Image"
          class="w-full h-48 object-cover"
        />

        <div class="p-5">
          <h2 class="text-xl font-bold mb-2">Programming</h2>
          <p class="text-gray-600 mb-4">
            Master programming concepts through practical coding projects.
          </p>

          <button class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded">
            Start Now
          </button>
        </div>
      </div>

    </div>

  </body>
</html>
